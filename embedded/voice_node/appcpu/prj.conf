# voice_node appcpu — APP CPU (Core 1) image
# Runs on xiao_esp32s3/esp32s3/appcpu
#
# No console on this core. Log output is forwarded to procpu via IPM channel 1
# and printed there with a [C1] prefix. See src/main.c:ipm_log().

# ── IPC (inter-processor communication — APP CPU ↔ PRO CPU) ──────────────────
CONFIG_IPM=y

# ── I2S — PDM microphone (MSM261S4030H0R, GPIO41/42) ─────────────────────────
# DMA is required by the ESP32 I2S driver (uses DMA channels 2/3 for RX/TX)
CONFIG_DMA=y
CONFIG_I2S=y

# ── PSRAM — shared audio buffer (procpu inits hardware; appcpu needs cache) ──
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y

# ── Stack / heap ──────────────────────────────────────────────────────────────
# 8KB: I2S read + memcpy + IPM callbacks fit comfortably
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=2048
