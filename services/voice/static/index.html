<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232635;
      --border: #2e3148;
      --text: #e2e4ef;
      --text-muted: #7b7f9e;
      --accent: #5b7cf6;
      --accent-hover: #4a6be0;
      --user-bubble: #1e2a52;
      --assistant-bubble: #1a1d27;
      --danger: #e05b5b;
      --listening: #e05b5b;
      --success: #5be07a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    header a:hover { color: var(--text); }
    header a svg { width: 14px; height: 14px; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      text-align: center;
    }

    #status-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      min-width: 90px;
      text-align: center;
      transition: all 0.2s;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 720px;
      width: 100%;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .message.user .avatar { background: var(--accent); color: #fff; }
    .message.assistant .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      animation: blink 0.9s step-end infinite;
      margin-left: 2px;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #bottom {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #visualizer {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-bottom: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #visualizer.active { opacity: 1; }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--listening);
      animation: wave 1.2s ease-in-out infinite;
      min-height: 4px;
    }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }
    .bar:nth-child(6) { animation-delay: 0.3s; }
    .bar:nth-child(7) { animation-delay: 0.2s; }
    .bar:nth-child(8) { animation-delay: 0.1s; }
    .bar:nth-child(9) { animation-delay: 0s; }
    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 24px; }
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #text-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      resize: none;
      height: 44px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #text-input:focus { border-color: var(--accent); }
    #text-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn svg { color: #fff; }

    #mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: var(--text-muted);
    }
    #mic-btn:hover { background: var(--surface); color: var(--text); }
    #mic-btn.listening {
      background: var(--listening);
      border-color: var(--listening);
      color: #fff;
      box-shadow: 0 0 0 4px rgba(224, 91, 91, 0.25);
    }
    #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    #error-toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3d1a1a;
      border: 1px solid var(--danger);
      color: #f4a0a0;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      max-width: 400px;
      text-align: center;
    }
    #error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <a href="/" title="Back to Chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Chat
  </a>
  <h1>Voice Assistant</h1>
  <div id="status-badge">idle</div>
</header>

<div id="conversation">
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    <p>Click the microphone to start speaking<br>or type a message below</p>
  </div>
</div>

<div id="bottom">
  <div id="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div id="controls">
    <button id="mic-btn" title="Hold or click to record">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="text-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send-btn" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<div id="error-toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let chatSessionId = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isBusy = false;
let currentAssistantBubble = null;
let currentAudio = null;

// ── Audio device warmup ───────────────────────────────────────────────────────
// Keep a Web Audio context alive with a silent oscillator so the audio device
// never "sleeps". This prevents the OS from cutting off the first syllable of
// TTS playback due to hardware warmup delay.
let _audioCtx = null;
function ensureAudioWarm() {
  if (_audioCtx) return;
  _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = _audioCtx.createOscillator();
  const gain = _audioCtx.createGain();
  gain.gain.value = 0;  // completely silent
  osc.connect(gain);
  gain.connect(_audioCtx.destination);
  osc.start();
  // Resume in case browser started it suspended (autoplay policy)
  _audioCtx.resume().catch(() => {});
}

// ── DOM ──────────────────────────────────────────────────────────────────────
const conversation = document.getElementById('conversation');
const emptyState = document.getElementById('empty-state');
const statusBadge = document.getElementById('status-badge');
const micBtn = document.getElementById('mic-btn');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const visualizer = document.getElementById('visualizer');
const errorToast = document.getElementById('error-toast');

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(label, color) {
  statusBadge.textContent = label;
  statusBadge.style.color = color || '';
  statusBadge.style.borderColor = color || '';
}

function showError(msg) {
  errorToast.textContent = msg;
  errorToast.classList.add('show');
  setTimeout(() => errorToast.classList.remove('show'), 4000);
}

function hideEmpty() {
  if (emptyState) emptyState.remove();
}

function addMessage(role, text) {
  hideEmpty();
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  conversation.appendChild(wrap);
  conversation.scrollTop = conversation.scrollHeight;
  return bubble;
}

function startStreamingMessage() {
  hideEmpty();
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const textNode = document.createTextNode('');
  bubble.appendChild(textNode);

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  conversation.appendChild(wrap);
  conversation.scrollTop = conversation.scrollHeight;
  currentAssistantBubble = bubble;
  return { bubble, cursor, textNode };
}

// ── Chat Session ─────────────────────────────────────────────────────────────
async function ensureSession() {
  if (chatSessionId) return;
  const resp = await fetch('/api/chat/create-chat-session', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ persona_id: 0 }),
  });
  if (!resp.ok) throw new Error(`Session creation failed: ${resp.status}`);
  const data = await resp.json();
  chatSessionId = data.chat_session_id;
}

// ── TTS pipeline helpers ──────────────────────────────────────────────────────

// Kick off a TTS fetch immediately; returns Promise<Blob> so the player can
// await it just before playback — synthesis and LLM streaming overlap.
function fetchAudio(text) {
  return fetch('/voice/synthesize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  }).then(r => { if (!r.ok) throw new Error('TTS failed'); return r.blob(); });
}

async function playBlob(blob) {
  // Ensure context exists and is active.
  ensureAudioWarm();
  if (_audioCtx.state === 'suspended') await _audioCtx.resume();
  const arrayBuffer = await blob.arrayBuffer();
  const audioBuffer = await _audioCtx.decodeAudioData(arrayBuffer);
  await new Promise((resolve, reject) => {
    const source = _audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(_audioCtx.destination);
    source.onended = () => { currentAudio = null; resolve(); };
    currentAudio = source;
    try { source.start(); } catch (e) { reject(e); }
  });
}

// Split accumulated text into complete sentences + trailing fragment.
// Requires the next char to be uppercase to avoid splitting abbreviations
// like "Dr. Smith" or decimal numbers.
function extractSentences(text, isEnd = false) {
  const sentences = [];
  const parts = text.split(/(?<=[.!?])\s+(?=[A-Z"'])/);
  for (let i = 0; i < parts.length - 1; i++) {
    if (parts[i].trim()) sentences.push(parts[i].trim());
  }
  const last = parts[parts.length - 1].trim();
  if (isEnd && last) sentences.push(last);
  return { sentences, remaining: isEnd ? '' : last };
}

// Parse one NDJSON/SSE line from the Onyx stream; return token text or null.
function extractToken(line) {
  const raw = line.startsWith('data: ') ? line.slice(6).trim() : line.trim();
  if (!raw || raw === '[DONE]') return null;
  try {
    const packet = JSON.parse(raw);
    if (packet.obj?.type === 'message_delta' && packet.obj.content) {
      return packet.obj.content;
    }
  } catch (_) {}
  return null;
}

// ── Send message → stream response → synthesize (pipelined) ──────────────────
//
// How it works:
//   1. LLM tokens stream in; sentence boundaries are detected on the fly.
//   2. Each complete sentence immediately kicks off fetchAudio() — a TTS HTTP
//      request that runs concurrently while the LLM keeps generating.
//   3. A player coroutine runs in parallel: it awaits each audio promise in
//      order and plays them back-to-back. By the time sentence 1 finishes
//      playing, sentence 2's audio is often already fetched and ready.
async function sendMessage(userText) {
  if (!userText.trim() || isBusy) return;
  isBusy = true;
  micBtn.disabled = true;

  addMessage('user', userText);

  try {
    await ensureSession();
  } catch (e) {
    showError('Could not start chat session. Are you logged into Onyx?');
    isBusy = false;
    micBtn.disabled = false;
    setStatus('idle');
    return;
  }

  setStatus('generating…', '#5b7cf6');
  const { bubble, cursor, textNode } = startStreamingMessage();
  let fullText = '';

  // Queue of in-flight TTS promises, one per sentence, in order.
  const audioQueue = [];  // Promise<Blob>[]
  let llmDone = false;
  let notifyPlayer = null;

  function enqueue(sentence) {
    audioQueue.push(fetchAudio(sentence));
    // Wake the player if it's waiting for the next item.
    if (notifyPlayer) { notifyPlayer(); notifyPlayer = null; }
  }

  // Player runs concurrently with LLM streaming. It waits for each audio
  // promise in order, playing as soon as each one resolves.
  const playerDone = (async () => {
    let idx = 0;
    while (true) {
      if (idx < audioQueue.length) {
        setStatus('speaking…', '#5be07a');
        try { await playBlob(await audioQueue[idx++]); } catch (e) { console.error('TTS playback error:', e); }
      } else if (llmDone) {
        break;
      } else {
        // Queue empty but LLM still running — sleep until next sentence arrives.
        await new Promise(r => { notifyPlayer = r; });
      }
    }
  })().catch(() => {});

  try {
    const resp = await fetch('/api/chat/send-message', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_session_id: chatSessionId,
        message: userText,
        parent_message_id: null,
        prompt_id: null,
        search_doc_ids: [],
        retrieval_options: { run_search: 'auto', real_time: true },
        stream_response: true,
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API error ${resp.status}: ${err}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let pending = '';  // accumulates tokens until a sentence boundary

    while (true) {
      const { done, value } = await reader.read();
      if (done) {
        // Flush any partial line left in the decoder buffer.
        if (buffer.trim()) {
          const token = extractToken(buffer);
          if (token) { fullText += token; pending += token; textNode.textContent = fullText; }
        }
        // Flush the trailing sentence fragment (no terminal punctuation needed).
        const { sentences } = extractSentences(pending, true);
        for (const s of sentences) enqueue(s);
        break;
      }

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();  // hold back incomplete last line

      for (const line of lines) {
        const token = extractToken(line);
        if (token) {
          fullText += token;
          textNode.textContent = fullText;
          conversation.scrollTop = conversation.scrollHeight;
          pending += token;
          // Fire TTS for each complete sentence immediately.
          const { sentences, remaining } = extractSentences(pending);
          for (const s of sentences) enqueue(s);
          pending = remaining;
        }
      }
    }
  } catch (e) {
    if (!fullText) {
      bubble.textContent = '[Error: ' + e.message + ']';
      showError(e.message);
    }
  } finally {
    cursor.remove();
    llmDone = true;
    if (notifyPlayer) { notifyPlayer(); notifyPlayer = null; }
  }

  await playerDone;

  if (!fullText.trim()) bubble.textContent = '[No response]';
  setStatus('idle');
  isBusy = false;
  micBtn.disabled = false;
}

// ── Microphone recording ──────────────────────────────────────────────────────
async function startRecording() {
  if (isBusy) return;
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    showError('Microphone access denied. Allow mic in browser settings.');
    return;
  }

  audioChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';

  mediaRecorder = new MediaRecorder(stream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(audioChunks, { type: mimeType });
    await handleAudioBlob(blob);
  };

  mediaRecorder.start(100);
  isRecording = true;
  micBtn.classList.add('listening');
  visualizer.classList.add('active');
  setStatus('listening…', '#e05b5b');
}

function stopRecording() {
  if (!mediaRecorder || !isRecording) return;
  mediaRecorder.stop();
  isRecording = false;
  micBtn.classList.remove('listening');
  visualizer.classList.remove('active');
  setStatus('transcribing…', '#f0a840');
}

async function handleAudioBlob(blob) {
  isBusy = true;
  micBtn.disabled = true;
  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  let text = '';
  try {
    const resp = await fetch('/voice/transcribe', { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(`Transcription failed: ${resp.status}`);
    const data = await resp.json();
    text = data.text?.trim();
  } catch (e) {
    showError('Transcription failed: ' + e.message);
    isBusy = false;
    micBtn.disabled = false;
    setStatus('idle');
    return;
  }

  if (!text) {
    showError('No speech detected. Try again.');
    isBusy = false;
    micBtn.disabled = false;
    setStatus('idle');
    return;
  }

  await sendMessage(text);
}

// ── Event listeners ───────────────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  ensureAudioWarm();
  if (isBusy && !isRecording) return;
  if (isRecording) {
    stopRecording();
  } else {
    // Stop any playing audio when user starts recording
    if (currentAudio) {
      currentAudio.stop();  // AudioBufferSourceNode.stop() fires onended
      currentAudio = null;
      isBusy = false;
      micBtn.disabled = false;
    }
    startRecording();
  }
});

sendBtn.addEventListener('click', () => {
  ensureAudioWarm();
  const text = textInput.value.trim();
  if (text) {
    textInput.value = '';
    sendMessage(text);
  }
});

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = textInput.value.trim();
    if (text) {
      textInput.value = '';
      sendMessage(text);
    }
  }
});

// Auto-grow textarea
textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
});

setStatus('idle');
</script>
</body>
</html>
