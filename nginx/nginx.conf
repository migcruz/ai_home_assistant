events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    upstream api_server {
        server api_server:8080;
    }

    upstream web_server {
        server web_server:3000;
    }

    server {
        listen 80;
        server_name _;

        # Onyx Web UI
        location / {
            proxy_pass http://web_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # Onyx API
        location /api/ {
            proxy_pass http://api_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Needed for streaming LLM responses
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Voice service (STT + TTS + UI)
        # resolver + variable = lazy DNS resolution so nginx starts even if voice-service isn't up yet
        location /voice/ {
            resolver 127.0.0.11 valid=10s;
            set $voice_upstream "voice-service:8765";
            proxy_pass http://$voice_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Ollama API (direct access — restrict in production)
        location /ollama/ {
            proxy_pass http://ollama:11434/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 600s;
        }
    }
}
