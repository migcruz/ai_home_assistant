# voice_node — Seeed XIAO ESP32S3 Sense
# Milestone 1: WiFi + TLS + WebSocket connectivity
#
# Build:  west build --sysbuild -d build -b xiao_esp32s3/esp32s3/procpu/sense procpu
# Flash:  west flash --sysbuild -d build  (run inside the container)

# ── WiFi ──────────────────────────────────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_DHCPV4=y

# net iface, ping, dns, sockets, routes, stats
CONFIG_NET_SHELL=y
# wifi scan/connect/disconnect/status
CONFIG_NET_L2_WIFI_SHELL=y

# ── TLS ───────────────────────────────────────────────────────────────────────
CONFIG_MBEDTLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# Default is 1 — we only open one TLS session at a time.
# We previously set this to 4, wasting 3 × 1264 = ~3.8KB of DRAM.
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=1
# Reduce per-connection TLS record buffer from 16KB to 4KB to save RAM.
# Voice service messages are small JSON + chunked WAV; 4KB records are fine.
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096

# ── WebSocket ─────────────────────────────────────────────────────────────────
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_HTTP_CLIENT=y

# ── mDNS (resolves vulcan.local on the LAN) ───────────────────────────────────
CONFIG_MDNS_RESOLVER=y

# ── PSRAM (external 8MB — required for TLS + audio buffers) ───────────────────
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y
# CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y # for the ESP flash tool

# ── GPIO ──────────────────────────────────────────────────────────────────────
# CONFIG_GPIO=y
# CONFIG_GPIO_SHELL=y          # gpio get/set/toggle — useful for testing I2S pins

# ── Storage (LittleFS on storage_partition, 0x3b0000, 192KB) ─────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# ── IPC (inter-processor communication — PRO CPU ↔ APP CPU) ──────────────────
CONFIG_IPM=y

# ── Shell ─────────────────────────────────────────────────────────────────────
# Interactive shell over the same UART as the console. Built-in commands:
# kernel, net, wifi, log — useful for runtime inspection without reflashing.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
# Reduce shell UART TX ring buffer from default 2048 → 512 to save 1536 bytes of DRAM.
# 512 bytes is plenty for interactive command echoes and short log lines.
CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=512

# ── Logging over USB Serial/JTAG (built into ESP32S3, no USB stack needed) ────
# The ESP32S3 routes UART0 over USB-C natively via the USB Serial/JTAG
# peripheral. CONFIG_LOG_BACKEND_UART sends output there automatically.
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── ESP32 internal timer task ─────────────────────────────────────────────────
# Default is 4096 in DRAM; WiFi and BLE callbacks are simple, 2048 is plenty.
# Saves exactly 2048 bytes from .dram0.bss.
CONFIG_ESP32_TIMER_TASK_STACK_SIZE=2048

# ── Logging ───────────────────────────────────────────────────────────────────
# Reduce internal log buffer from default 1024 → 512 for extra DRAM headroom.
CONFIG_LOG_BUFFER_SIZE=512

# ── Memory ────────────────────────────────────────────────────────────────────
# 64KB overflows DRAM with WiFi + networking stack; 48KB fits
# CONFIG_ESP_SPIRAM selects SHARED_MULTI_HEAP — a dual DRAM+PSRAM allocator.
# CONFIG_ESP_SPIRAM_HEAP_SIZE (default 1MB) lives in the .ext_ram.data PSRAM
# linker section and does NOT touch DRAM.  Large runtime allocations (mbedTLS,
# LwIP, WebSocket buffers) fall through to the PSRAM heap automatically.
# The DRAM heap is kept at the pre-TLS value; the net_thread stack is placed
# in PSRAM (.ext_ram.bss) to stay within the DRAM budget.
# Zephyr enforces a minimum of ~45KB (sum of all subsystem Z_HEAP_MEM_POOL_SIZE_ADD
# requests from WiFi + TLS + networking).  Setting below that is silently raised.
# Any value >= 45336 is used as-is; we set it at the forced floor to not waste DRAM.
CONFIG_HEAP_MEM_POOL_SIZE=45336

# ── Network packet pools ───────────────────────────────────────────────────────
# Defaults are 4 each.  We only have one concurrent TCP/TLS/WS connection,
# so 2 is sufficient.  Each packet entry is ~1152 bytes; 2 fewer saves ~2.3KB
# per pool, ~4.6KB total.
CONFIG_NET_PKT_RX_COUNT=2
CONFIG_NET_PKT_TX_COUNT=2

# Reduce the connection table from the default of 4 to 2.
# We open exactly 1 WebSocket (= 1 TCP connection) at a time.
CONFIG_NET_MAX_CONN=2
CONFIG_MAIN_STACK_SIZE=4096

# ── WiFi credentials (do not commit — use credentials.conf) ───────────────────
# CONFIG_WIFI_SSID="YourNetwork"
# CONFIG_WIFI_PSK="YourPassword"
